<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 730" font-family="Segoe UI, Verdana, Arial, sans-serif">
  <defs>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3.5" fill="context-stroke"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1220" height="730" fill="#0a0f0c"/>

  <!-- Title -->
  <text x="610" y="38" text-anchor="middle" font-size="28" font-weight="700" fill="#39ff14">CHUZA V1 — Wiring Diagram</text>
  <text x="610" y="60" text-anchor="middle" font-size="13" fill="#7fae8f">Seeed XIAO ESP32S3 Sense · generated from include/CHUZAPins.h</text>

  <!-- Camera (onboard, stacked on the MCU board) -->
  <rect x="510" y="82" width="200" height="68" rx="8" fill="#12261c" stroke="#7fae8f" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="610" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#3ddc84">OV2640 Camera</text>
  <text x="610" y="128" text-anchor="middle" font-size="10" fill="#7fae8f">onboard Sense module</text>
  <text x="610" y="142" text-anchor="middle" font-size="10" fill="#7fae8f">factory-routed — no wiring</text>
  <line x1="610" y1="150" x2="610" y2="185" stroke="#7fae8f" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- MCU -->
  <rect x="470" y="185" width="280" height="210" rx="12" fill="#111a14" stroke="#39ff14" stroke-width="3"/>
  <text x="610" y="270" text-anchor="middle" font-size="20" font-weight="700" fill="#39ff14">Seeed XIAO</text>
  <text x="610" y="294" text-anchor="middle" font-size="20" font-weight="700" fill="#39ff14">ESP32S3 Sense</text>
  <text x="610" y="316" text-anchor="middle" font-size="11" fill="#7fae8f">ESP32-S3 · dual-core · WiFi</text>

  <!-- Left / Right motors (onboard DRV8833 outputs) -->
  <rect x="40" y="68" width="140" height="62" rx="8" fill="#111a14" stroke="#3ddc84" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#3ddc84">LEFT MOTOR</text>
  <text x="110" y="113" text-anchor="middle" font-size="9" fill="#7fae8f">AOUT1 / AOUT2</text>

  <rect x="200" y="68" width="140" height="62" rx="8" fill="#111a14" stroke="#3ddc84" stroke-width="2"/>
  <text x="270" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#3ddc84">RIGHT MOTOR</text>
  <text x="270" y="113" text-anchor="middle" font-size="9" fill="#7fae8f">BOUT1 / BOUT2</text>

  <g stroke="#3ddc84" stroke-width="2">
    <line x1="110" y1="130" x2="110" y2="150"/>
    <line x1="270" y1="130" x2="270" y2="150"/>
  </g>
  <g fill="#3ddc84">
    <circle cx="110" cy="130" r="4"/><circle cx="110" cy="150" r="4"/>
    <circle cx="270" cy="130" r="4"/><circle cx="270" cy="150" r="4"/>
  </g>

  <!-- DRV8833 -->
  <rect x="40" y="150" width="300" height="210" rx="10" fill="#111a14" stroke="#3ddc84" stroke-width="2.5"/>
  <text x="110" y="166" text-anchor="middle" font-size="9" fill="#7fae8f">AOUT1/2</text>
  <text x="270" y="166" text-anchor="middle" font-size="9" fill="#7fae8f">BOUT1/2</text>
  <text x="190" y="195" text-anchor="middle" font-size="18" font-weight="700" fill="#3ddc84">DRV8833</text>
  <text x="190" y="216" text-anchor="middle" font-size="11" fill="#7fae8f">Dual H-Bridge Motor Driver</text>
  <text x="190" y="280" text-anchor="middle" font-size="9" fill="#7fae8f">VM = Batt+ · VCC = 3V3 · GND = common</text>
  <text x="325" y="219" text-anchor="end" font-size="10" fill="#39ff14">AIN1</text>
  <text x="325" y="247" text-anchor="end" font-size="10" fill="#39ff14">AIN2</text>
  <text x="325" y="275" text-anchor="end" font-size="10" fill="#39ff14">BIN1</text>
  <text x="325" y="303" text-anchor="end" font-size="10" fill="#39ff14">BIN2</text>

  <!-- I2C bus -->
  <rect x="880" y="150" width="300" height="230" rx="10" fill="#111a14" stroke="#39ff14" stroke-width="2.5"/>
  <text x="1030" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#39ff14">I2C Bus</text>
  <text x="1030" y="205" text-anchor="middle" font-size="10" fill="#7fae8f">shared SDA / SCL — 3 devices</text>
  <rect x="900" y="222" width="260" height="38" rx="6" fill="#0a0f0c" stroke="#3ddc84" stroke-width="1.5"/>
  <text x="1030" y="246" text-anchor="middle" font-size="10" fill="#3ddc84">BME280 — Temp / Humidity / Pressure</text>
  <rect x="900" y="266" width="260" height="38" rx="6" fill="#0a0f0c" stroke="#3ddc84" stroke-width="1.5"/>
  <text x="1030" y="290" text-anchor="middle" font-size="10" fill="#3ddc84">VL53L0X — ToF Distance / Cliff Sensor</text>
  <rect x="900" y="310" width="260" height="38" rx="6" fill="#0a0f0c" stroke="#3ddc84" stroke-width="1.5"/>
  <text x="1030" y="334" text-anchor="middle" font-size="10" fill="#3ddc84">SSD1306 OLED — 128×64 Face Display</text>

  <!-- I2C bus trunk: SDA/SCL from the MCU tap into every device on the bus -->
  <line x1="880" y1="215" x2="880" y2="329" stroke="#39ff14" stroke-width="2.5"/>
  <g stroke="#39ff14" stroke-width="2">
    <line x1="880" y1="241" x2="900" y2="241"/>
    <line x1="880" y1="285" x2="900" y2="285"/>
    <line x1="880" y1="329" x2="900" y2="329"/>
  </g>
  <g fill="#39ff14">
    <circle cx="880" cy="241" r="3.5"/><circle cx="900" cy="241" r="3.5"/>
    <circle cx="880" cy="285" r="3.5"/><circle cx="900" cy="285" r="3.5"/>
    <circle cx="880" cy="329" r="3.5"/><circle cx="900" cy="329" r="3.5"/>
  </g>

  <!-- Buzzer -->
  <rect x="880" y="410" width="300" height="80" rx="10" fill="#111a14" stroke="#3ddc84" stroke-width="2"/>
  <text x="1030" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#3ddc84">Piezo Buzzer</text>
  <text x="1030" y="465" text-anchor="middle" font-size="10" fill="#7fae8f">PWM tones &amp; chirps</text>

  <!-- Touch pad -->
  <rect x="880" y="510" width="300" height="80" rx="10" fill="#111a14" stroke="#3ddc84" stroke-width="2"/>
  <text x="1030" y="545" text-anchor="middle" font-size="13" font-weight="700" fill="#3ddc84">Capacitive Touch Pad</text>
  <text x="1030" y="565" text-anchor="middle" font-size="10" fill="#7fae8f">single / triple-tap gestures</text>

  <!-- Battery -->
  <rect x="470" y="460" width="280" height="130" rx="10" fill="#111a14" stroke="#ffcc00" stroke-width="2.5"/>
  <text x="610" y="495" text-anchor="middle" font-size="14" font-weight="700" fill="#ffcc00">LiPo Battery + Divider</text>
  <text x="610" y="515" text-anchor="middle" font-size="10" fill="#7fae8f">resistor divider halves pack V</text>
  <text x="610" y="531" text-anchor="middle" font-size="10" fill="#7fae8f">for the ADC — BatterySensor doubles it back</text>
  <text x="610" y="550" text-anchor="middle" font-size="9" fill="#7fae8f">also powers DRV8833 (VM) + XIAO regulator</text>

  <!-- Wires: DRV8833 <-> MCU (motors) -->
  <g stroke="#3ddc84" stroke-width="2">
    <line x1="340" y1="215" x2="470" y2="215"/>
    <line x1="340" y1="243" x2="470" y2="243"/>
    <line x1="340" y1="271" x2="470" y2="271"/>
    <line x1="340" y1="299" x2="470" y2="299"/>
  </g>
  <g fill="#3ddc84">
    <circle cx="340" cy="215" r="4"/><circle cx="470" cy="215" r="4"/>
    <circle cx="340" cy="243" r="4"/><circle cx="470" cy="243" r="4"/>
    <circle cx="340" cy="271" r="4"/><circle cx="470" cy="271" r="4"/>
    <circle cx="340" cy="299" r="4"/><circle cx="470" cy="299" r="4"/>
  </g>

  <!-- Wires: MCU <-> I2C bus -->
  <g stroke="#39ff14" stroke-width="2">
    <line x1="750" y1="215" x2="880" y2="215"/>
    <line x1="750" y1="243" x2="880" y2="243"/>
  </g>
  <g fill="#39ff14">
    <circle cx="750" cy="215" r="4"/><circle cx="880" cy="215" r="4"/>
    <circle cx="750" cy="243" r="4"/><circle cx="880" cy="243" r="4"/>
  </g>

  <!-- Wires: MCU <-> Buzzer / Touch -->
  <g stroke="#3ddc84" stroke-width="2">
    <line x1="750" y1="271" x2="880" y2="445"/>
    <line x1="750" y1="299" x2="880" y2="545"/>
  </g>
  <g fill="#3ddc84">
    <circle cx="750" cy="271" r="4"/><circle cx="880" cy="445" r="4"/>
    <circle cx="750" cy="299" r="4"/><circle cx="880" cy="545" r="4"/>
  </g>

  <!-- Wire: MCU <-> Battery sense -->
  <g stroke="#ffcc00" stroke-width="2">
    <line x1="570" y1="395" x2="610" y2="460"/>
  </g>
  <g fill="#ffcc00">
    <circle cx="570" cy="395" r="4"/><circle cx="610" cy="460" r="4"/>
  </g>

  <!-- Wire labels (drawn last so they sit on top of everything) -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <rect x="373" y="196" width="64" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="405" y="209" fill="#39ff14">D9 → LF</text>

    <rect x="368" y="224" width="74" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="405" y="237" fill="#39ff14">D10 → LB</text>

    <rect x="373" y="252" width="64" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="405" y="265" fill="#39ff14">D0 → RF</text>

    <rect x="373" y="280" width="64" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="405" y="293" fill="#39ff14">D6 → RB</text>

    <rect x="778" y="196" width="74" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="815" y="209" fill="#39ff14">D4 → SDA</text>

    <rect x="778" y="224" width="74" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="815" y="237" fill="#39ff14">D5 → SCL</text>

    <rect x="778" y="349" width="74" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="815" y="362" fill="#3ddc84">D8 → PWM</text>

    <rect x="770" y="413" width="90" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="815" y="426" fill="#3ddc84">D1 → Touch</text>

    <rect x="527" y="418" width="126" height="18" rx="4" fill="#0a0f0c" opacity="0.9"/>
    <text x="590" y="431" fill="#ffcc00">D2 → Batt Sense</text>
  </g>

  <!-- Notes -->
  <line x1="40" y1="615" x2="1180" y2="615" stroke="#7fae8f" stroke-width="1" opacity="0.4"/>
  <text x="40" y="640" font-size="12" font-weight="700" fill="#39ff14">Notes</text>
  <text x="40" y="662" font-size="11" fill="#7fae8f">• GPIO aliases (D0–D10) are Seeed XIAO ESP32S3 silkscreen labels — see include/CHUZAPins.h for the raw GPIO numbers.</text>
  <text x="40" y="682" font-size="11" fill="#7fae8f">• All modules share a common GND with the XIAO ESP32S3.</text>
  <text x="40" y="702" font-size="11" fill="#7fae8f">• OV2640 camera pins (XCLK, SIOD, SIOC, Y2–Y9, VSYNC, HREF, PCLK) are fixed silicon routing on the Sense board — not user-wired.</text>
</svg>
